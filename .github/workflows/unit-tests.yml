name: Unit Tests

on:
  workflow_dispatch:
  workflow_call:
  push:
  pull_request:

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: '**/*.md'

  build-dlls:
    uses: ./.github/workflows/build-dlls.yml

  test:
    name: Unit Tests (${{ matrix.exe }} - ${{ matrix.version }})
    runs-on: windows-latest
    needs: build-dlls
    permissions:
      contents: read
      checks: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        exe: ['AutoHotkey64.exe']
        version: ['2.1-latest']

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Download tree-sitter DLLs
        uses: actions/download-artifact@v8
        with:
          name: tree-sitter-dlls
          path: bin

      - name: Install AutoHotkey V2
        uses: holy-tao/install-autohotkey@v2.1.0
        with:
          version: ${{ matrix.version }}

      - name: Run Build Scripts
        shell: powershell
        run: ${{ matrix.exe }} /ErrorStdOut build/barrel.ahk

      - name: Run Tests
        working-directory: tests
        shell: powershell
        run: ${{ matrix.exe }} /ErrorStdOut RunTests.ahk

      - name: Publish Test Results
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: tests/junit.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          check_name: Test Results (${{ matrix.exe }} - ${{ matrix.version }})

  all-tests-passed:
    name: All Tests Passed
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Fail if any matrix job failed
        if: needs.test.result != 'success'
        run: exit 1
